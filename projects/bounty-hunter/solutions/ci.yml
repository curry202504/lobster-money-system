name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  foundry:
    name: Foundry Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Foundry version
        run: forge --version

      - name: Forge Build
        run: forge build --sizes
        id: build

      - name: Forge Test
        run: forge test -vvv
        id: test

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npx eslint src/ --ext .ts
        continue-on-error: true

      - name: Run tests
        run: npm test
